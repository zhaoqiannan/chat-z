<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- White Background Base -->
  <rect width="100%" height="100%" fill="#FFFFFF" rx="100" />
  
  <defs>
    <!-- Cyan-focused Modern Gradient -->
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="60%" stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#70F3FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Base Circle Frame -->
  <circle cx="256" cy="256" r="220" fill="#FFFFFF" filter="url(#shadow)" stroke="#F1F5F9" stroke-width="2"/>

  <!-- Elegant outer dashed circle representing conversation loop -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#E2E8F0" stroke-width="6" stroke-dasharray="12 12"/>
  
  <!-- Bold 'Z' line that anchors the design -->
  <path d="M 140 140 
           L 372 140 
           L 140 372 
           L 372 372" 
        fill="none" 
        stroke="url(#gradC)" 
        stroke-width="38" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  
  <!-- Two speech dots / nodes -->
  <circle cx="200" cy="256" r="18" fill="#0066FF"/>
  <circle cx="312" cy="256" r="18" fill="#00C9FF"/>
</svg>